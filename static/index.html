<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Refinement Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f4ff',
              100: '#dce6ff',
              500: '#3b6ef5',
              600: '#2b5ce6',
              700: '#1e48cc',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Spinner animation */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }

    /* Fade-in for results */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }

    /* Textarea resize handle color */
    textarea { resize: vertical; }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800 font-sans">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-3xl mx-auto px-6 py-4 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center shadow">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-semibold text-slate-900 leading-tight">AI Refinement Bot</h1>
        <p class="text-xs text-slate-500">Powered by gpt-4o-mini</p>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-3xl mx-auto px-6 py-10 space-y-6">

    <!-- Input card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <label for="description" class="block text-sm font-medium text-slate-700 mb-2">
        Issue Description
      </label>
      <textarea
        id="description"
        rows="8"
        placeholder="Paste your Jira issue description here..."
        class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
      ></textarea>

      <div class="mt-4 flex items-center justify-between">
        <p id="char-count" class="text-xs text-slate-400">0 characters</p>
        <button
          id="analyze-btn"
          onclick="analyze()"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white text-sm font-medium shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <svg id="btn-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span id="btn-label">Analyze</span>
        </button>
      </div>
    </div>

    <!-- Error banner -->
    <div id="error-banner" class="hidden rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 flex items-start gap-2">
      <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      <span id="error-msg"></span>
    </div>

    <!-- Results -->
    <div id="results" class="hidden fade-in space-y-4">

      <!-- Metrics row -->
      <div class="grid grid-cols-2 gap-4">

        <!-- Story Points -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col items-center gap-1">
          <span class="text-xs font-medium text-slate-500 uppercase tracking-wide">Story Points</span>
          <span id="res-story-points" class="text-5xl font-bold text-brand-500 leading-none mt-1"></span>
          <span class="text-xs text-slate-400">person days</span>
        </div>

        <!-- Priority -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col items-center gap-1">
          <span class="text-xs font-medium text-slate-500 uppercase tracking-wide">Priority</span>
          <span id="res-priority-badge" class="mt-2 px-3 py-1 rounded-full text-sm font-semibold uppercase tracking-wide"></span>
        </div>

      </div>

      <!-- Justification -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <h2 class="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-1.5">
          <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Justification
        </h2>
        <p id="res-justification" class="text-sm text-slate-600 leading-relaxed"></p>
      </div>

    </div>
  </main>

  <script>
    const PRIORITY_STYLES = {
      blocker:  { bg: 'bg-red-100',    text: 'text-red-700',    label: 'Blocker'  },
      critical: { bg: 'bg-orange-100', text: 'text-orange-700', label: 'Critical' },
      major:    { bg: 'bg-yellow-100', text: 'text-yellow-700', label: 'Major'    },
      normal:   { bg: 'bg-sky-100',    text: 'text-sky-700',    label: 'Normal'   },
      minor:    { bg: 'bg-emerald-100',text: 'text-emerald-700',label: 'Minor'    },
    };

    const descEl    = document.getElementById('description');
    const charCount = document.getElementById('char-count');
    const btn       = document.getElementById('analyze-btn');
    const btnLabel  = document.getElementById('btn-label');
    const btnIcon   = document.getElementById('btn-icon');
    const results   = document.getElementById('results');
    const errBanner = document.getElementById('error-banner');
    const errMsg    = document.getElementById('error-msg');

    descEl.addEventListener('input', () => {
      charCount.textContent = `${descEl.value.length} characters`;
    });

    function setLoading(loading) {
      btn.disabled = loading;
      btnLabel.textContent = loading ? 'Analyzing...' : 'Analyze';
      btnIcon.className = loading
        ? 'w-4 h-4 rounded-full border-2 border-white border-t-transparent spinner'
        : 'w-4 h-4';
      if (!loading) {
        btnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>';
        btnIcon.setAttribute('fill', 'none');
        btnIcon.setAttribute('viewBox', '0 0 24 24');
        btnIcon.setAttribute('stroke', 'currentColor');
        btnIcon.setAttribute('stroke-width', '2.5');
      }
    }

    function showError(msg) {
      errMsg.textContent = msg;
      errBanner.classList.remove('hidden');
      results.classList.add('hidden');
    }

    function hideError() {
      errBanner.classList.add('hidden');
    }

    function renderResults(data) {
      hideError();

      document.getElementById('res-story-points').textContent = data.story_points;
      document.getElementById('res-justification').textContent = data.justification;

      const badge = document.getElementById('res-priority-badge');
      const style = PRIORITY_STYLES[data.priority] || PRIORITY_STYLES.normal;
      badge.className = `mt-2 px-3 py-1 rounded-full text-sm font-semibold uppercase tracking-wide ${style.bg} ${style.text}`;
      badge.textContent = style.label;

      results.classList.remove('hidden');
      // Re-trigger fade-in
      results.classList.remove('fade-in');
      void results.offsetWidth;
      results.classList.add('fade-in');
    }

    async function analyze() {
      const description = descEl.value.trim();
      if (!description) {
        showError('Please enter an issue description before analyzing.');
        return;
      }

      hideError();
      setLoading(true);

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ description }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Server error (${res.status})`);
        }

        const data = await res.json();
        renderResults(data);
      } catch (e) {
        showError(e.message || 'An unexpected error occurred. Please try again.');
      } finally {
        setLoading(false);
      }
    }

    // Allow Ctrl+Enter / Cmd+Enter to submit
    descEl.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
